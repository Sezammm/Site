<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>

  <style>
    :root {
      --bg-color: #010005;
      --text-color: #eaf3ff;
      --muted-color: #9db3cc;
      --button-text: #f3f8ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    .hero-404 {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1100px, 92vw);
      aspect-ratio: 16 / 9;
      pointer-events: none;
      z-index: 0;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lure-glow,
    .number-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Свечение лампы рыбы — привязано к картинке */
    .lure-glow {
      background:
        radial-gradient(circle at 57% 38%,
        rgba(255, 255, 255, 1) 0,
        rgba(235, 245, 255, 1) 0.7%,
        rgba(200, 230, 255, 0.95) 2%,
        rgba(180, 220, 255, 0.55) 5%,
        rgba(180, 220, 255, 0.25) 9%,
        rgba(180, 220, 255, 0.08) 14%,
          transparent 22%);
      animation: lureGlow 2.5s ease-in-out infinite;
      filter: brightness(1.15);
    }

    /* Мягкая подсветка цифр 404 */
    .number-glow {
      background:
        radial-gradient(circle at 42% 42%,
          rgba(180, 220, 255, 0.14) 0,
          rgba(120, 180, 255, 0.07) 8%,
          rgba(80, 120, 220, 0.03) 16%,
          transparent 25%);
      animation: numberGlow 5.5s ease-in-out infinite;
    }

    @keyframes lureGlow {
      0% {
        opacity: 0;
      }

      40% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes numberGlow {
      0%, 100% {
        opacity: 0.55;
      }
      50% {
        opacity: 0.84;
      }
    }

    .page-404 {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      text-align: center;
      padding: 40px 20px 56px;
    }

    .content {
      max-width: 950px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(36px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.65);
    }

    p {
      margin: 0 0 22px;
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.6;
      color: var(--muted-color);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.65);
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .home-button {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 12px;
      border: 1px solid rgba(180, 220, 255, 0.20);
      background: rgba(255,255,255,0.06);
      color: var(--button-text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition:
        background 0.3s ease,
        transform 0.2s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease;
    }

    .home-button:hover {
      background: rgba(180, 220, 255, 0.15);
      border-color: rgba(180, 220, 255, 0.45);
      box-shadow:
        0 0 12px rgba(180, 220, 255, 0.35),
        0 0 28px rgba(180, 220, 255, 0.15);
      transform: translateY(-2px);
    }

    .home-button:active {
      transform: translateY(0);
      background: rgba(180, 220, 255, 0.22);
      box-shadow:
        0 0 8px rgba(180, 220, 255, 0.35),
        inset 0 0 12px rgba(180, 220, 255, 0.25);
    }


    @media (max-width: 900px) {
      .hero-404 {
        top: 36px;
        width: min(1000px, 96vw);
      }

      .page-404 {
        min-height: 100svh;
        padding: 34px 20px 42px;
      }
    }



    @media (max-width: 600px) {
      .hero-404 {
        top: 12px;
        width: 122vw;
        max-width: none;
      }

      .page-404 {
        min-height: 100svh;
        align-items: flex-start;
        justify-content: center;
        padding: 74vw 16px calc(28px + env(safe-area-inset-bottom));
      }

      .content {
        max-width: 100%;
      }

      p {
        margin-bottom: 18px;
        white-space: normal;
      }

      .home-button {
        width: 100%;
        max-width: 280px;
      }
    }


  </style>
</head>
<body>
  <div class="hero-404">
    <img src="/img/404.webp" alt="404 underwater illustration" class="hero-image">
    <div class="lure-glow"></div>
    <div class="number-glow"></div>
  </div>

  <main class="page-404">
    <div class="content">
      <h1>Page not found</h1>
      <p>The page you are looking for may have been moved, removed, or never existed.</p>
      <a class="home-button" href="/">Back to Homepage</a>
    </div>
  </main>
</body>
</html>
